services:
  mysql:
    image: mysql:8.0
    container_name: trello-reminder-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-trello_reminder}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-app}
    ports:
      - "3307:3306"
    volumes:
      - ./.data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trello-net

  alembic:
    image: masterglorious/trello-reminder:latest
    container_name: trello-reminder-alembic
    command: alembic upgrade head
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
    depends_on:
      mysql:
        condition: service_healthy
    restart: no
    networks:
      - trello-net

  app:
    image: masterglorious/trello-reminder:latest
    container_name: trello-reminder-app
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - trello-net

networks:
  trello-net:
    driver: bridge
